<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Raport Qu</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    // Konfigurasi Tailwind Custom untuk Warna Tema Dinamis
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            primary: 'var(--color-primary)', 
            primaryHover: 'var(--color-primary-hover)', 
            primaryLight: 'var(--color-primary-light)' 
          }
        }
      }
    }
  </script>

  <!-- FontAwesome Icons CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --color-primary: #0d5c3b;
      --color-primary-hover: #064e3b;
      --color-primary-light: #ecfdf5;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .table-container { max-height: 60vh; overflow-y: auto; overflow-x: auto; scrollbar-width: thin; }
    .table-container thead th { position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    window.isDemoAccount = false;

    // --- PEMETAAN IKON ---
    const Icon = ({ name, className, title }) => <i className={`fas ${name} ${className || ''}`} title={title}></i>;
    const Home = (p) => <Icon name="fa-home" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const BookOpen = (p) => <Icon name="fa-book-open" {...p} />;
    const Printer = (p) => <Icon name="fa-print" {...p} />;
    const Settings = (p) => <Icon name="fa-cog" {...p} />;
    const LogOut = (p) => <Icon name="fa-sign-out-alt" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const Menu = (p) => <Icon name="fa-bars" {...p} />;
    const FileSpreadsheet = (p) => <Icon name="fa-file-excel" {...p} />;
    const Activity = (p) => <Icon name="fa-chart-line" {...p} />;
    const Building = (p) => <Icon name="fa-building" {...p} />;
    const Download = (p) => <Icon name="fa-download" {...p} />;
    const ClipboardList = (p) => <Icon name="fa-clipboard-list" {...p} />;
    const GraduationCap = (p) => <Icon name="fa-graduation-cap" {...p} />;
    const LinkIcon = (p) => <Icon name="fa-link" {...p} />;
    const RefreshCw = (p) => <Icon name="fa-sync-alt" {...p} />;
    const ExternalLink = (p) => <Icon name="fa-external-link-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const PieChart = (p) => <Icon name="fa-chart-pie" {...p} />;
    const Filter = (p) => <Icon name="fa-filter" {...p} />;
    const FileBadge = (p) => <Icon name="fa-id-badge" {...p} />;
    const Palette = (p) => <Icon name="fa-palette" {...p} />;
    const UserIcon = (p) => <Icon name="fa-user-circle" {...p} />;

    // === KONFIGURASI BACKEND GOOGLE APPS SCRIPT ===
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxbO2Fi5EnZFuNcbLdkhQAg4nXHv_Ob7pcv0MmI6ZbQeNd-TOR0fMIhAbJB78W1lqM/exec";

    const syncToCloud = async (key, payload, tahunAjaran) => {
      if (window.isDemoAccount) {
        window.dispatchEvent(new CustomEvent('demo-toast', { detail: "Akun Demo Aktif: Anda hanya bisa membaca dan mencoba fitur. Data tidak disimpan ke Database." }));
        return;
      }
      try {
        const formattedTahunAjaran = tahunAjaran ? tahunAjaran.replace(/\//g, '_').replace(/ /g, '') : '2025_2026';
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'save', key, payload, tahunAjaran: `Tahun_${formattedTahunAjaran}` })
        });
      } catch (error) { console.error(`[Cloud Sync Failed] Key: ${key}`, error); }
    };

    const cleanLogoUrl = (input) => {
      if (!input) return '';
      const srcMatch = input.match(/src\s*=\s*["']([^"']+)["']/);
      if (srcMatch) return srcMatch[1];
      return input.replace(/<[^>]*>?/gm, '').trim(); 
    };

    const INITIAL_PROFIL = { namaSekolah: '', npsn: '', kepalaSekolah: '', nip: '', semester: '1 (SATU)', tahunAjaran: '2025/2026', tanggalRaport: '', kecamatan: '', alamat: '', logo: '' };
    const INITIAL_TEMA = { colorTheme: 'hijau', adminPhoto: '', useWatermark: true, watermarkOpacity: 15, tableHeaderBg: '#0d5c3b', tableHeaderTxt: '#ffffff' };
    const INITIAL_TEACHERS = [];
    const INITIAL_MAPEL = [];
    const INITIAL_EKSKUL = [];
    const DIMENSI_P5 = ['Keimanan dan ketaqwaan kepada Tuhan yang Maha Esa', 'Kewargaan', 'Penalaran kritis', 'Kreativitas', 'Kolaborasi', 'Kemandirian', 'Kesehatan', 'Komunikasi'];
    const INITIAL_KKM = { kkm: 70, batasA: 90, batasB: 80, batasC: 70 };

    const COLOR_THEMES = {
      hijau: { primary: '#0d5c3b', primaryHover: '#064e3b', primaryLight: '#ecfdf5' },
      biru: { primary: '#1d4ed8', primaryHover: '#1e3a8a', primaryLight: '#eff6ff' },
      ungu: { primary: '#6d28d9', primaryHover: '#4c1d95', primaryLight: '#f5f3ff' },
      merah: { primary: '#e11d48', primaryHover: '#9f1239', primaryLight: '#fff1f2' }
    };

    const toProperCase = (str) => {
      if (!str) return '';
      return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
    };

    function parseCSV(str) {
      const arr = []; let quote = false;
      for (let row = 0, col = 0, c = 0; c < str.length; c++) {
          let cc = str[c], nc = str[c+1];
          arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
          if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
          if (cc === '"') { quote = !quote; continue; }
          if (cc === ',' && !quote) { ++col; continue; }
          if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
          if (cc === '\n' && !quote) { ++row; col = 0; continue; }
          if (cc === '\r' && !quote) { ++row; col = 0; continue; }
          arr[row][col] += cc;
      }
      return arr;
    }

    // --- KOMPONEN UTAMA (App) ---
    function App() {
      const [isAppLoading, setIsAppLoading] = useState(true);
      const [loadingProgress, setLoadingProgress] = useState(0); 
      const [user, setUser] = useState(null); 
      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [toastMessage, setToastMessage] = useState(null);

      const [profilSekolah, setProfilSekolah] = useState(INITIAL_PROFIL);
      const [temaConfig, setTemaConfig] = useState(INITIAL_TEMA);
      const [guruProfil, setGuruProfil] = useState({});
      const [teachers, setTeachers] = useState(INITIAL_TEACHERS);
      const [mapelList, setMapelList] = useState(INITIAL_MAPEL);
      const [ekskulList, setEkskulList] = useState(INITIAL_EKSKUL);
      const [allStudents, setAllStudents] = useState([]); 
      
      const [materiGuru, setMateriGuru] = useState({}); 
      const [studentGrades, setStudentGrades] = useState({}); 
      const [absensi, setAbsensi] = useState({}); 
      const [ekskulData, setEkskulData] = useState({}); 
      const [kokuData, setKokuData] = useState({}); 
      const [guruMapelConfig, setGuruMapelConfig] = useState({}); 
      const [guruRombelConfig, setGuruRombelConfig] = useState({}); 
      const [dimensiTarget, setDimensiTarget] = useState([DIMENSI_P5[0], DIMENSI_P5[5], DIMENSI_P5[3]]);
      const [kkmConfig, setKkmConfig] = useState(INITIAL_KKM);

      const [confirmDialog, setConfirmDialog] = useState(null);

      // Menerapkan Tema CSS
      useEffect(() => {
         const t = COLOR_THEMES[temaConfig.colorTheme] || COLOR_THEMES.hijau;
         document.documentElement.style.setProperty('--color-primary', t.primary);
         document.documentElement.style.setProperty('--color-primary-hover', t.primaryHover);
         document.documentElement.style.setProperty('--color-primary-light', t.primaryLight);
      }, [temaConfig.colorTheme]);

      useEffect(() => {
        const handleDemoToast = (e) => showToast(e.detail);
        window.addEventListener('demo-toast', handleDemoToast);

        const fetchInitialData = async () => {
          let progress = 0;
          const animInterval = setInterval(() => {
             progress += Math.floor(Math.random() * 8) + 2;
             if(progress > 90) progress = 90;
             setLoadingProgress(progress);
          }, 300);

          try {
            const activeYear = localStorage.getItem('activeTahunAjaran') || '2025_2026';
            const res = await fetch(GAS_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'loadAll', tahunAjaran: `Tahun_${activeYear}` })
            });
            const json = await res.json();
            
            if (json.status === 'success' && json.data) {
              if (json.data.profil) setProfilSekolah(json.data.profil);
              if (json.data.temaConfig) setTemaConfig(json.data.temaConfig);
              if (json.data.guruProfil) setGuruProfil(json.data.guruProfil);
              if (json.data.teachers) setTeachers(json.data.teachers);
              if (json.data.mapel) setMapelList(json.data.mapel);
              if (json.data.ekskul) setEkskulList(json.data.ekskul);
              if (json.data.allStudents) setAllStudents(json.data.allStudents);
              if (json.data.materiGuru) setMateriGuru(json.data.materiGuru);
              if (json.data.studentGrades) setStudentGrades(json.data.studentGrades);
              if (json.data.absensi) setAbsensi(json.data.absensi);
              if (json.data.ekskulData) setEkskulData(json.data.ekskulData);
              if (json.data.kokuData) setKokuData(json.data.kokuData);
              if (json.data.guruMapelConfig) setGuruMapelConfig(json.data.guruMapelConfig);
              if (json.data.guruRombelConfig) setGuruRombelConfig(json.data.guruRombelConfig);
              if (json.data.dimensiTarget) setDimensiTarget(json.data.dimensiTarget);
              if (json.data.kkmConfig) setKkmConfig(json.data.kkmConfig);
            }
          } catch (e) {
            console.error("Gagal load initial data", e);
          } finally {
            clearInterval(animInterval);
            setLoadingProgress(100);
            setTimeout(() => setIsAppLoading(false), 800); 
          }
        };
        fetchInitialData();

        return () => window.removeEventListener('demo-toast', handleDemoToast);
      }, []);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 3500);
      };

      const showConfirm = (message, onConfirm) => {
        setConfirmDialog({ message, onConfirm });
      };

      const handleLogin = (role, nama, username) => {
        setUser({ role, name: nama || (role === 'admin' ? (profilSekolah.kepalaSekolah || 'Admin Kepala Sekolah') : 'Guru'), username });
        setActiveMenu('dashboard');
      };

      const students = useMemo(() => {
        if (!user) return [];
        if (user.role === 'admin') return allStudents;
        const rombel = guruRombelConfig[user.username];
        if (!rombel) return [];
        return allStudents.filter(s => s.rombelSD === rombel);
      }, [user, allStudents, guruRombelConfig]);

      const activeMapelList = user?.role === 'admin' 
        ? mapelList 
        : (guruMapelConfig[user?.username] && guruMapelConfig[user?.username].length > 0 
            ? guruMapelConfig[user?.username] 
            : mapelList);

      const calculateNA = (mapel, studentId, mg = materiGuru, sg = studentGrades) => {
        const materi = mg[mapel] || [];
        const scores = (sg[mapel] || {})[studentId] || {};
        let totalM = 0, countM = 0;
        materi.forEach((m, idx) => {
          if(m.trim() !== '' && scores[`m${idx}`] !== undefined && scores[`m${idx}`] !== null) {
             totalM += scores[`m${idx}`]; countM++;
          }
        });
        if (countM === 0 && (scores.sts === undefined || scores.sts === null) && (scores.sas === undefined || scores.sas === null)) return null;
        const rataM = countM > 0 ? totalM / countM : 0;
        return parseFloat((((rataM) + (scores.sts||0) + (scores.sas||0)) / (countM > 0 ? 3 : ((scores.sts!==undefined&&scores.sts!==null) && (scores.sas!==undefined&&scores.sas!==null) ? 2 : 1))).toFixed(2));
      };

      const getPredikat = (nilai, config = kkmConfig) => {
        if(nilai === null || nilai === undefined || isNaN(nilai)) return '-';
        const n = parseFloat(nilai);
        if(n >= config.batasA) return 'A';
        if(n >= config.batasB) return 'B';
        if(n >= config.batasC) return 'C';
        return 'D';
      };

      if (isAppLoading) {
        return (
          <div className="fixed inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center p-6 text-center">
            {profilSekolah.logo ? (
              <img src={cleanLogoUrl(profilSekolah.logo)} className="w-32 h-32 mb-8 object-contain drop-shadow-xl animate-pulse" alt="Logo Sekolah" />
            ) : (
              <GraduationCap className="w-24 h-24 text-primary mb-8 animate-pulse text-6xl" />
            )}
            <div className="w-full max-w-sm h-6 bg-slate-200 rounded-full overflow-hidden mb-4 shadow-inner relative">
               <div className="h-full bg-gradient-to-r from-emerald-500 to-primary transition-all duration-300 ease-out flex items-center justify-end pr-3" style={{width: `${loadingProgress}%`}}>
                  {loadingProgress > 10 && <span className="text-xs text-white font-bold">{loadingProgress}%</span>}
               </div>
            </div>
            <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight mb-2">Memuat Database E-Raport Qu...</h2>
            <p className="text-sm font-bold text-slate-500 mt-4 bg-primaryLight px-4 py-2 rounded-full border border-primary/20">Version 1.0 by Amal Khairi, S.Pd., Gr.</p>
          </div>
        );
      }

      const activeContext = { profil: profilSekolah, temaConfig, guruProfil, teachers, mapel: mapelList, ekskul: ekskulList, allStudents, materiGuru, studentGrades, absensi, ekskulData, kokuData, guruMapelConfig, dimensiTarget, kkmConfig };

      if (!user) return <LoginScreen onLogin={handleLogin} teachers={teachers} profil={profilSekolah} temaConfig={temaConfig} />;

      const renderContent = () => {
        if (user.role === 'admin') {
          switch (activeMenu) {
            case 'dashboard': return <AdminDashboard teachers={teachers} students={allStudents} />;
            case 'data_guru': return <AdminDataGuru teachers={teachers} setTeachers={setTeachers} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'master_mapel': return <AdminMasterMapel mapel={mapelList} setMapel={setMapelList} ekskul={ekskulList} setEkskul={setEkskulList} profil={profilSekolah} showToast={showToast} />;
            case 'kkm_nilai': return <AdminKKM kkmConfig={kkmConfig} setKkmConfig={setKkmConfig} profil={profilSekolah} showToast={showToast} />;
            case 'data_siswa': return <AdminDataSiswa allStudents={allStudents} setAllStudents={setAllStudents} profil={profilSekolah} showToast={showToast} />;
            case 'profil': return <AdminProfil profil={profilSekolah} setProfil={setProfilSekolah} showToast={showToast} />;
            case 'pengaturan_tema': return <AdminPengaturanTema temaConfig={temaConfig} setTemaConfig={setTemaConfig} profil={profilSekolah} showToast={showToast} />;
            case 'progress_guru': return <AdminProgressGuru teachers={teachers} students={allStudents} mapelList={mapelList} studentGrades={studentGrades} materiGuru={materiGuru} calculateNA={calculateNA} />;
            case 'leger_admin': return <AdminPrintFilter defaultContext={activeContext} showToast={showToast} renderComponent={(filtered, rombel, waliName, ctx, printProfil) => <GuruLeger students={filtered} mapelList={ctx.mapel} calculateNA={(m, id) => calculateNA(m, id, ctx.materiGuru, ctx.studentGrades)} profil={printProfil} waliKelasName={waliName} showToast={showToast} />} />;
            case 'cetak_rapor_admin': return <AdminPrintFilter defaultContext={activeContext} showToast={showToast} renderComponent={(filtered, rombel, waliName, ctx, printProfil) => <GuruCetakRapor students={filtered} mapelList={ctx.mapel} calculateNA={(m, id) => calculateNA(m, id, ctx.materiGuru, ctx.studentGrades)} getPredikat={(n) => getPredikat(n, ctx.kkmConfig)} profil={printProfil} waliKelasName={waliName} kokuData={ctx.kokuData} dimensiTarget={ctx.dimensiTarget} ekskulList={ctx.ekskul} ekskulData={ctx.ekskulData} absensi={ctx.absensi} materiGuru={ctx.materiGuru} studentGrades={ctx.studentGrades} kkmConfig={ctx.kkmConfig} temaConfig={ctx.temaConfig} showToast={showToast} />} />;
            case 'cetak_sampul_admin': return <AdminPrintFilter defaultContext={activeContext} showToast={showToast} renderComponent={(filtered, rombel, waliName, ctx, printProfil) => <GuruCetakSampul students={filtered} profil={printProfil} showToast={showToast} />} />;
            default: return <AdminDashboard teachers={teachers} students={allStudents} />;
          }
        } else {
          switch (activeMenu) {
            case 'dashboard': return <GuruDashboard user={user} students={students} mapelList={activeMapelList} studentGrades={studentGrades} calculateNA={calculateNA} />;
            case 'profil_guru': return <GuruProfil guruProfil={guruProfil} setGuruProfil={setGuruProfil} username={user.username} profil={profilSekolah} showToast={showToast} />;
            case 'pengaturan_mapel': return <GuruPengaturanMapel mapelList={mapelList} activeMapelList={activeMapelList} setGuruMapelConfig={setGuruMapelConfig} username={user.username} profil={profilSekolah} showToast={showToast} />;
            case 'tarik_siswa': return <GuruTarikSiswa allStudents={allStudents} guruRombelConfig={guruRombelConfig} setGuruRombelConfig={setGuruRombelConfig} username={user.username} profil={profilSekolah} showToast={showToast} />;
            case 'input_materi': return <GuruInputMateri mapelList={activeMapelList} materiGuru={materiGuru} setMateriGuru={setMateriGuru} profil={profilSekolah} showToast={showToast} />;
            case 'input_nilai': return <GuruInputNilai mapelList={activeMapelList} materiGuru={materiGuru} studentGrades={studentGrades} setStudentGrades={setStudentGrades} students={students} calculateNA={calculateNA} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'input_absensi': return <GuruInputAbsensi students={students} absensi={absensi} setAbsensi={setAbsensi} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'input_ekskul': return <GuruInputEkskul students={students} ekskulList={ekskulList} ekskulData={ekskulData} setEkskulData={setEkskulData} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'input_koku': return <GuruInputKoku students={students} kokuData={kokuData} setKokuData={setKokuData} dimensiTarget={dimensiTarget} setDimensiTarget={setDimensiTarget} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'leger': return <GuruLeger students={students} mapelList={activeMapelList} calculateNA={calculateNA} profil={profilSekolah} waliKelasName={user.name} showToast={showToast} />;
            case 'cetak_rapor': return <GuruCetakRapor students={students} mapelList={activeMapelList} calculateNA={calculateNA} getPredikat={getPredikat} profil={profilSekolah} waliKelasName={user.name} kokuData={kokuData} dimensiTarget={dimensiTarget} ekskulList={ekskulList} ekskulData={ekskulData} absensi={absensi} materiGuru={materiGuru} studentGrades={studentGrades} kkmConfig={kkmConfig} temaConfig={temaConfig} showToast={showToast} />;
            case 'cetak_sampul': return <GuruCetakSampul students={students} profil={profilSekolah} showToast={showToast} />;
            default: return <GuruDashboard user={user} students={students} mapelList={activeMapelList} studentGrades={studentGrades} calculateNA={calculateNA} />;
          }
        }
      };

      const currentMenus = user.role === 'admin' ? [
        { id: 'dashboard', label: 'Dashboard', icon: <Home /> },
        { id: 'data_guru', label: 'Data Guru', icon: <Users /> },
        { id: 'master_mapel', label: 'Master Mapel & Ekskul', icon: <BookOpen /> },
        { id: 'kkm_nilai', label: 'KKM & Predikat', icon: <Settings /> },
        { id: 'data_siswa', label: 'Sinkron Siswa (CSV)', icon: <FileSpreadsheet /> },
        { id: 'profil', label: 'Profil Sekolah', icon: <Building /> },
        { id: 'pengaturan_tema', label: 'Pengaturan Tema', icon: <Palette /> },
        { id: 'progress_guru', label: 'Progress Pengisian', icon: <PieChart /> },
        { id: 'leger_admin', label: 'Cetak Leger Global', icon: <FileSpreadsheet /> },
        { id: 'cetak_rapor_admin', label: 'Cetak Rapor Global', icon: <Printer /> },
        { id: 'cetak_sampul_admin', label: 'Cetak Sampul Global', icon: <FileBadge /> },
      ] : [
        { id: 'dashboard', label: 'Dashboard Guru', icon: <Home /> },
        { id: 'profil_guru', label: 'Profil Guru', icon: <UserIcon /> },
        { id: 'pengaturan_mapel', label: 'Pilih Mapel Diampu', icon: <Filter /> },
        { id: 'tarik_siswa', label: 'Pilih / Tarik Siswa', icon: <Download /> },
        { id: 'input_materi', label: 'Input Deskripsi/TP', icon: <BookOpen /> },
        { id: 'input_nilai', label: 'Input Nilai Akademik', icon: <FileText /> },
        { id: 'input_absensi', label: 'Input Kehadiran', icon: <ClipboardList /> },
        { id: 'input_ekskul', label: 'Nilai Ekstrakurikuler', icon: <Activity /> },

      const [pasteData, setPasteData] = useState('');

      const handlePasteSubmit = () => {
        try {
          const rows = pasteData.split('\n').filter(r => r.trim() !== '');
          const newTeachers = rows.map((row, index) => {
            const cols = row.split('\t'); 
            return {
              id: Date.now() + index,
              nama: cols[1] || 'Tanpa Nama',
              nip: cols[2] || '-',
              waliKelas: cols[3] || '-',
              mapel: cols[4] || '-',
              username: cols[5] || 'user',
              password: cols[6] || '123',
              ket: cols[7] || 'Aktif'
            };
          });
          const updatedList = [...teachers, ...newTeachers];
          setTeachers(updatedList);
          syncToCloud('teachers', updatedList, profil.tahunAjaran);
          setShowPaste(false); setPasteData(''); showToast(`${newTeachers.length} Guru berhasil diimpor & disimpan!`);

          showToast("Format paste tidak sesuai. Pastikan urutan Excel benar.");

    function AdminDataSiswa({ allStudents, setAllStudents, profil, showToast }) {
      const [csvUrl, setCsvUrl] = useState("https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9NDKstrj0d9JH7PSMGc4X9ZP1JEarvqoXhF2BZcesqs52oW_jYNKd_fI832uYg/pub?gid=1632329455&single=true&output=csv");
      const [loading, setLoading] = useState(false);

      const handleSync = async () => {
        setLoading(true);
        try {
          const res = await fetch(csvUrl);
          if(!res.ok) throw new Error("Gagal mengambil data");
          
          const text = await res.text();
          const rows = parseCSV(text);
          
          if (rows.length > 1) {
            const header = rows[0].map(h => h.trim().toUpperCase());
            const getCol = (hName) => header.findIndex(h => h.includes(hName.toUpperCase()));
            
            const iNama = getCol('NAMA SISWA');
            const iNisn = getCol('NISN');
            const iNis = getCol('NIS');
            const iRombel = getCol('ROMBEL SD');
            const iTempatLahir = getCol('TEMPAT TANGGAL LAHIR');
            const iJK = getCol('JENIS KELAMIN');
            const iNamaAyah = getCol('NAMA AYAH');
            const iNamaIbu = getCol('NAMA IBU');
            const iKerjaAyah = getCol('PEKERJAAN AYAH');
            const iKerjaIbu = getCol('PEKERJAAN IBU');
            const iDusun = getCol('DUSUN');
            const iDesa = getCol('DESA');
            const iKec = getCol('KECAMATAN');
            const iKab = getCol('KABUPATEN');
            const iAgama = getCol('AGAMA');

            const parsed = rows.slice(1).map((row, idx) => {
              const sName = iNama !== -1 ? row[iNama] : `Siswa ${idx+1}`;
              if (!sName || sName.trim() === '') return null;
              const nisnVal = iNisn !== -1 ? row[iNisn] : `00${idx}`;
              
              const existing = allStudents.find(old => old.nama === sName.trim() || old.nisn === nisnVal);
              const sId = existing ? existing.id : `S-${Date.now()}-${idx}`;

              return {
                id: sId,
                nama: sName.trim(),
                nisn: nisnVal,
                nis: iNis !== -1 ? row[iNis] : '-',
                rombelSD: iRombel !== -1 ? row[iRombel] : '-',
                tempatTanggalLahir: iTempatLahir !== -1 ? row[iTempatLahir] : '-',
                jenisKelamin: iJK !== -1 ? row[iJK] : '-',
                agama: iAgama !== -1 && row[iAgama] ? row[iAgama] : 'Islam',
                namaAyah: iNamaAyah !== -1 ? row[iNamaAyah] : '-',
                namaIbu: iNamaIbu !== -1 ? row[iNamaIbu] : '-',
                pekerjaanAyah: iKerjaAyah !== -1 ? row[iKerjaAyah] : '-',
                pekerjaanIbu: iKerjaIbu !== -1 ? row[iKerjaIbu] : '-',
                alamat: {
                  jalan: iDusun !== -1 ? row[iDusun] : '-',
                  desa: iDesa !== -1 ? row[iDesa] : '-',
                  kecamatan: iKec !== -1 ? row[iKec] : '-',
                  kabupaten: iKab !== -1 ? row[iKab] : '-',
                }
              };
            }).filter(s => s !== null); 
            
            if (parsed.length > 0) {
              setAllStudents(parsed);
              showToast(`Berhasil Sinkronisasi Master Data ${parsed.length} Siswa!`);
              syncToCloud('allStudents', parsed, profil.tahunAjaran);
            } else {
              throw new Error("Data kosong atau format salah");
            }
          }
        } catch (e) {
           console.error(e);
           showToast("Gagal menarik data. Pastikan link Google Sheets valid dan publik.");
        }
        setLoading(false);
      };
      
      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-8 rounded-[2rem] border border-slate-100 shadow-sm max-w-4xl">
          <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-50 text-blue-600 rounded-xl sm:rounded-2xl flex items-center justify-center mb-4 sm:mb-6"><RefreshCw className="text-xl sm:text-2xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Sinkronisasi Database Induk Siswa</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Data Master ditarik dari Spreadsheet. Nanti Guru Wali Kelas akan menarik datanya masing-masing berdasarkan Rombel SD.</p>
          
          <div className="flex flex-col md:flex-row gap-3 sm:gap-4 mb-4 sm:mb-6">
            <div className="flex-1 relative">
               <LinkIcon className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm" />
               <input type="text" className="w-full pl-10 pr-3 py-3 sm:py-4 bg-slate-50 border border-slate-200 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none" value={csvUrl} onChange={e=>setCsvUrl(e.target.value)} placeholder="https://docs.google.com/..." />
            </div>
            <button onClick={handleSync} disabled={loading} className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-bold shadow-md flex items-center justify-center gap-2 disabled:opacity-70 whitespace-nowrap">
              {loading ? <RefreshCw className="animate-spin" /> : <Download />}
              {loading ? 'Membaca Data...' : 'Sinkron & Simpan Master'}
            </button>
          </div>
        </div>
      );
    }

                   const classStudents = students.filter(s => s.rombelSD === t.waliKelas);

                   let totalFilled = 0;

                         });

                   const progress = totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100);

                   return (
                     <tr key={t.id || idx} className="hover:bg-slate-50">
                       <td className="p-2 sm:px-4 sm:py-3 font-bold text-slate-800 border-r">{t.nama}</td>

      );

         setIsLoading(true);
         setRombel(''); 
         try {

              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'loadAll', tahunAjaran: `Tahun_${activeYear}` })

            }
         } catch (e) {
            showToast('Gagal menghubungi server database.');
         } finally {
            setIsLoading(false);
         }
      };

      const ctx = hData ? {
         profil: hData.profil || INITIAL_PROFIL,
         temaConfig: hData.temaConfig || INITIAL_TEMA,
         teachers: hData.teachers || [],
         mapel: hData.mapel || [],

               if (calculateNA(m, s.id) !== null) {

      const progress = totalExpected === 0 ? 0 : Math.round((totalFilled / totalExpected) * 100);

      return (
        <div className="space-y-4 sm:space-y-6">

              </p>
            </div>

              <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                <path className="text-slate-100" strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path className="text-primary" strokeDasharray={`${progress}, 100`} strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />

    function GuruInputNilai({ mapelList, materiGuru, studentGrades, setStudentGrades, students, calculateNA, profil, showToast, showConfirm }) {
      const [selectedMapel, setSelectedMapel] = useState(mapelList[0] || '');
      const grades = studentGrades[selectedMapel] || {};
      const currentMateri = (materiGuru[selectedMapel] || []).filter(m => m !== '');

      const handleChange = (studentId, field, val) => {
        const valFloat = val === '' ? undefined : parseFloat(val);
        setStudentGrades(prev => ({
          ...prev, 
          [selectedMapel]: {
            ...(prev[selectedMapel] || {}),
            [studentId]: { ...((prev[selectedMapel] || {})[studentId] || {}), [field]: valFloat }
          }
        }));
      };

      const handleSave = () => {
        syncToCloud('studentGrades', studentGrades, profil.tahunAjaran);
        showToast(`Semua Nilai Akademik Mapel ${selectedMapel} Disimpan!`);
      };

      const handleReset = () => {
        showConfirm(`PERINGATAN! Yakin ingin KOSONGKAN/HAPUS seluruh nilai siswa pada mata pelajaran ${selectedMapel}? Data tidak dapat dikembalikan.`, () => {
          setStudentGrades(prev => {
            const updated = { ...prev };
            delete updated[selectedMapel];
            syncToCloud('studentGrades', updated, profil.tahunAjaran);
            return updated;
          });
          showToast(`Data Nilai ${selectedMapel} Berhasil Dihapus!`);
        });
      };

      const generateKeterangan = (s, studentGradesLocal) => {
        if (!studentGradesLocal || currentMateri.length === 0) return '';
        let maxVal = -1, minVal = 101, maxIdx = -1, minIdx = -1, countMateri = 0;
        currentMateri.forEach((_, idx) => {
          const val = studentGradesLocal[`m${idx}`];
          if (val !== undefined && !isNaN(val)) {
            if (val > maxVal) { maxVal = val; maxIdx = idx; }
            if (val < minVal) { minVal = val; minIdx = idx; }
            countMateri++;
          }
        });
        if (countMateri === 0) return '-';

        let ket = `Menunjukkan penguasaan sangat baik dalam ${currentMateri[maxIdx]}`;
        if (minVal < 70) {
          ket += `. Perlu bimbingan pada ${currentMateri[minIdx]}.`;
        } else if (maxIdx !== minIdx) {
          ket += `, dan penguasaan yang baik dalam ${currentMateri[minIdx]}.`;
        } else {
          ket += `.`;
        }
        return ket;
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-4 sm:p-8 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col h-full">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 sm:mb-6 gap-3 sm:gap-4 border-b border-slate-100 pb-4">

                {mapelList.map(m => <option key={m}>{m}</option>)}
              </select>
              <button onClick={handleReset} className="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-2 sm:px-4 sm:py-3.5 rounded-xl font-bold transition-all flex items-center justify-center shrink-0" title="Hapus Semua Nilai Mapel Ini"><Trash2 /></button>
            </div>
          </div>

          {currentMateri.length === 0 ? (
            <div className="bg-amber-50 text-amber-800 p-4 sm:p-6 rounded-2xl border border-amber-200 font-bold flex items-center gap-3 sm:gap-4 text-xs sm:text-base">
              <span className="text-xl sm:text-3xl">⚠️</span>
              <p>Anda belum mengisi Materi/Deskripsi untuk mata pelajaran <u>{selectedMapel || 'ini'}</u>. Silakan isi di menu <b>Input Deskripsi/TP</b>.</p>
            </div>
          ) : students.length === 0 ? (
            <div className="bg-red-50 text-red-800 p-4 sm:p-6 rounded-2xl border border-red-200 font-bold text-xs sm:text-base">Silahkan pilih / kunci Rombel Kelas terlebih dahulu di menu "Pilih / Tarik Siswa".</div>
          ) : (
            <>
              <div className="w-full border border-slate-200 rounded-xl sm:rounded-2xl pb-2 table-container">
                <table className="w-full text-left table-fixed break-words border-collapse text-[8px] sm:text-sm min-w-[800px] md:min-w-full">
                  <thead className="bg-slate-50 border-b border-slate-200">

    function GuruLeger({ students, mapelList, calculateNA, profil, waliKelasName, showToast }) {
      const legerData = students.map((s) => {
        let total = 0;
        let scores = {};
        mapelList.forEach(m => {
          let na = calculateNA(m, s.id) || 0;
          scores[m] = na;
          total += na;
        });
        let avg = mapelList.length > 0 ? (total / mapelList.length).toFixed(2) : 0;
        return { ...s, total, avg, scores };
      }).sort((a, b) => b.total - a.total); 

      legerData.forEach((s, i) => s.juara = i + 1);

      const htmlPrint = () => {
        const theadMapel = mapelList.map(m => `<th class="border border-black p-2 text-center text-xs w-10 rotate-180" style="background-color: #0d5c3b !important; color: white !important; -webkit-print-color-adjust: exact; writing-mode: vertical-rl;">${m}</th>`).join('');
        const tbodyRows = legerData.map((s, i) => {
          const mapelCols = mapelList.map(m => `<td class="border border-black p-2 text-center font-bold">${s.scores[m] ? s.scores[m].toFixed(2) : '-'}</td>`).join('');
          return `
            <tr>
              <td class="border border-black p-2 text-center">${i+1}</td>
              <td class="border border-black p-2 font-bold uppercase">${s.nama}</td>
              <td class="border border-black p-2 text-center">${s.nisn}</td>
              ${mapelCols}
              <td class="border border-black p-2 text-center bg-gray-100 font-bold" style="background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact;">${s.total.toFixed(2)}</td>
              <td class="border border-black p-2 text-center bg-gray-100 font-bold" style="background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact;">${s.avg}</td>
              <td class="border border-black p-2 text-center font-bold text-[#0d5c3b]">${s.juara}</td>
            </tr>
          `;
        }).join('');

        return `
          <html><head>
            <title>Leger Kelas</title>
            <scr`+`ipt src="https://cdn.tailwindcss.com"></scr`+`ipt>
            <style>
              @media print { 
                body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } 
                @page { size: landscape; margin: 10mm; }

    function GuruCetakRapor({ students, mapelList, calculateNA, getPredikat, profil, waliKelasName, kokuData, dimensiTarget, ekskulList, ekskulData, absensi, materiGuru, studentGrades, kkmConfig, temaConfig, showToast }) {
      const [selectedStudent, setSelectedStudent] = useState('ALL');

      const extractKecamatan = (kecString) => {
         if(!kecString) return '';

      };

      const getStudentHTML = (s) => {
        let totalNa = 0;
        const properName = toProperCase(s.nama);
        let isLulusSemua = true;
        
        const getKetMapel = (mapel, sId) => {
          const materi = (materiGuru[mapel] || []).filter(m => m !== '');
          const scores = (studentGrades[mapel] || {})[sId] || {};
          if(materi.length === 0) return `Memahami materi dengan sangat baik dan menunjukkan sikap positif.`;
          
          let maxVal = -1, minVal = 101, maxIdx = -1, minIdx = -1;
          materi.forEach((_, idx) => {
            const val = scores[`m${idx}`];
            if (val !== undefined && val !== null && !isNaN(val)) {
              if (val > maxVal) { maxVal = val; maxIdx = idx; }
              if (val < minVal) { minVal = val; minIdx = idx; }
            }
          });
          if(maxIdx === -1) return `-`;
          
          let ket = `Penguasaan sangat baik pada materi ${materi[maxIdx]}`;
          if (minVal < 70) ket += `. Perlu bimbingan dalam ${materi[minIdx]}.`;
          else if (maxIdx !== minIdx) ket += `, dan penguasaan baik dalam ${materi[minIdx]}.`;
          else ket += `.`;
          return ket;
        };

        let rows = mapelList.map((m, idx) => {
          let na = calculateNA(m, s.id);
          let pred = getPredikat(na);
          totalNa += (na || 0);

            <td class="border border-black p-2 text-center font-bold text-base">${pred}</td>

        let rataRata = mapelList.length > 0 ? (totalNa / mapelList.length).toFixed(2) : 0;

        let avgNum = parseFloat(rataRata);
        let dynamicCatatan = "";
        if (avgNum >= 90) dynamicCatatan = `Alhamdulillah, Ananda ${properName} meraih hasil belajar yang sangat memuaskan. Pertahankan prestasimu dan teruslah menjadi inspirasi!`;
        else if (avgNum >= 80) dynamicCatatan = `Prestasi belajar Ananda ${properName} sudah baik. Tingkatkan lagi fokus dan ketelitianmu agar hasilnya lebih maksimal.`;
        else if (avgNum >= (kkmConfig?.kkm || 70)) dynamicCatatan = `Ananda ${properName} telah mencapai ketuntasan. Mari tambah lagi waktu dan semangat belajarmu agar prestasimu semakin meningkat.`;
        else dynamicCatatan = `Ananda ${properName} membutuhkan bimbingan ekstra. Jangan patah semangat, teruslah rajin belajar dan berlatih dengan giat di rumah.`;

        const rowK = kokuData[s.id] || { jenis: 'Kokurikuler 7KAIH', d1: 'A', d2: 'A', d3: 'A' };
        const textKoku = `Ananda ${properName} Mengikuti Kokurikuler ${rowK.jenis} Dan Menunjukkan Capaian Pada Dimensi ${dimensiTarget[0]} Dengan Predikat (${rowK.d1}), ${dimensiTarget[1]} Predikat (${rowK.d2}) Serta ${dimensiTarget[2]} Mendapat Predikat (${rowK.d3}).`;

        const totalA = (a.sakit||0) + (a.izin||0) + (a.alfa||0);

        let kenaikanBox = "";
        const smtText = profil.semester.toLowerCase();
        if (smtText === '2 (dua)' || smtText.includes('genap')) {

                   <p style="margin:5px 0 0 0; font-size: 13px; font-style: italic;">"Alhamdulillah, Ananda ${properName} berhasil naik kelas. Lebih semangat dan tambah waktu belajarmu ya!"</p>

            } else {

                   <p style="margin:0; font-weight:bold; font-size: 14px;">Keputusan Akhir Semester:</p>
                   <p style="margin:5px 0; font-size: 14px;">Berdasarkan pencapaian seluruh kompetensi, peserta didik ditetapkan: <br/><span style="font-size: 16px;"><b>TINGGAL DI KELAS ${currentClassNum}</b></span></p>
                   <p style="margin:5px 0 0 0; font-size: 13px; font-style: italic;">"Ananda ${properName} harus tinggal di kelas. Jangan menyerah, tingkatkan kembali prestasi dan ikuti bimbingan dengan sungguh-sungguh."</p>

        const cetakKecamatan = extractKecamatan(profil.kecamatan);

        return `

                 <tr><td>Sekolah</td><td>:</td><td>${profil.namaSekolah}</td></tr>
                 <tr><td class="align-top">Alamat</td><td class="align-top">:</td><td class="font-normal">${profil.alamat}</td></tr>
               </table>

              <thead>
                <tr>
                  <th rowspan="2" class="border border-black p-2 w-10 text-center" style="background-color: ${headerBg} !important; color: ${headerTxt} !important; -webkit-print-color-adjust: exact;">No</th>
                  <th rowspan="2" class="border border-black p-2 text-center w-48" style="background-color: ${headerBg} !important; color: ${headerTxt} !important; -webkit-print-color-adjust: exact;">Mata Pelajaran</th>

                </tr>
                <tr>
                  <th class="border border-black p-2 text-center" style="background-color: ${headerBg} !important; color: ${headerTxt} !important; -webkit-print-color-adjust: exact;">Angka</th>
                  <th class="border border-black p-2 text-center" style="background-color: ${headerBg} !important; color: ${headerTxt} !important; -webkit-print-color-adjust: exact;">Pred.</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>

            <div class="flex justify-between px-2 relative z-10">
               <div class="flex items-center gap-4">
                 <span class="font-bold text-base">Rata-Rata</span>
                 <div class="border-2 border-black py-2 px-6 font-bold text-lg">${rataRata.toString().replace('.',',')}</div>
               </div>
               <div class="flex items-center gap-4">
                 <span class="font-bold text-base">Jumlah</span>
                 <div class="border-2 border-black py-2 px-6 font-bold text-lg">${totalNa.toFixed(2).replace('.',',')}</div>
               </div>
            </div>

            <div style="page-break-before: always; padding-top: 10mm; position: relative;">
               ${watermarkTag}
               
               <h3 class="font-bold mb-2 uppercase text-sm relative z-10" style="border-bottom: 2px solid black;">II. KOKURIKULER</h3>

                  <div class="flex-1 flex flex-col"><div class="font-bold text-xs text-center mb-1 uppercase">ALFA</div><div class="border border-black p-2 text-center font-bold text-lg">${a.alfa||0}</div></div>
                  <div class="flex-1 flex flex-col"><div class="font-bold text-xs text-center mb-1 uppercase">TOTAL</div><div class="border border-black p-2 text-center font-bold text-lg">${totalA}</div></div>

                ${s.nama}
             </div>

             <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">NIS / NISN</p>
             <div style="border: 2px solid black; padding: 15px 40px; font-size: 20px; font-weight: bold; min-width: 400px;">
                ${fv(s.nis)} / ${fv(s.nisn)}
             </div>
          </div>

          <!-- SAMPUL 2 (IDENTITAS PESERTA DIDIK) Tanpa Page-break-after agar hal kosong hilang -->
          <div style="padding: 15mm; font-family: 'Times New Roman', serif; font-size: 13px; position: relative; height: 100vh;">
             <h2 style="text-align: center; font-style: italic; font-weight: bold; text-decoration: underline; margin-bottom: 20px; font-size: 16px;">IDENTITAS PESERTA DIDIK</h2>
             
             <table style="width: 100%; line-height: 1.5;">
                <tr><td style="width: 35%;">1. Nama Peserta Didik</td><td style="width: 2%;">:</td><td style="text-transform: uppercase;"><b>${fv(s.nama)}</b></td></tr>
                <tr><td>2. Nomor Induk / NISN</td><td>:</td><td>${fv(s.nis)} / ${fv(s.nisn)}</td></tr>
                <tr><td>3. Tempat, Tanggal Lahir</td><td>:</td><td style="text-transform: uppercase;">${fv(s.tempatTanggalLahir)}</td></tr>
                <tr><td>4. Jenis Kelamin</td><td>:</td><td>${fv(s.jenisKelamin)}</td></tr>
                <tr><td>5. Agama</td><td>:</td><td style="text-transform: uppercase;">${fv(s.agama)}</td></tr>
                <tr><td>6. Pendidikan Sebelumnya</td><td>:</td><td>${fv(s.pendidikanSebelumnya)}</td></tr>
                <tr><td style="vertical-align: top;">7. Alamat Peserta Didik</td><td style="vertical-align: top;">:</td><td style="text-transform: uppercase;">${fv(s.alamat?.jalan)}, ${fv(s.alamat?.desa)}, KEC. ${fv(s.alamat?.kecamatan)}, ${fv(s.alamat?.kabupaten)}</td></tr>
                <tr><td colspan="3" style="padding-top: 5px;">8. Nama Orang Tua</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">a. Ayah</td><td>:</td><td style="text-transform: uppercase;">${fv(s.namaAyah)}</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">b. Ibu</td><td>:</td><td style="text-transform: uppercase;">${fv(s.namaIbu)}</td></tr>
                <tr><td colspan="3" style="padding-top: 5px;">9. Pekerjaan Orang Tua</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">a. Ayah</td><td>:</td><td style="text-transform: uppercase;">${fv(s.pekerjaanAyah)}</td></tr>
                <tr><td style="padding-left: 20px; font-weight: bold;">b. Ibu</td><td>:</td><td style="text-transform: uppercase;">${fv(s.pekerjaanIbu)}</td></tr>
             </table>

             <div style="display: flex; justify-content: flex-end; align-items: flex-end; margin-top: 15px; padding-right: 20px;">
                <div style="width: 1cm; height: 1cm; border: 1px solid black; opacity: 0.1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-family: Arial; margin-right: 20px; text-align: center;">
                   <span>Foto</span>
                </div>
                <div style="width: 250px; text-align: center;">
                   <p style="margin-bottom: 5px;">${cetakKecamatan}, ${profil.tanggalRaport}</p>
                   <p style="margin-bottom: 3cm; font-weight: bold;">Kepala Sekolah</p>
                   <p style="font-weight: bold; text-decoration: underline; text-transform: uppercase;">${profil.kepalaSekolah}</p>
                </div>
             </div>
          </div>
        `;
      };

      const handlePrint = () => {
        let toPrint = selectedStudent === 'ALL' ? students : students.filter(s => s.id.toString() === selectedStudent);
        if(toPrint.length === 0) { showToast('Siswa kosong, harap tarik/pilih Rombel terlebih dahulu'); return; }
        
        const combinedHTML = `
          <html><head>
            <title>Cetak Sampul</title>
            <style>
              @page { size: A4; margin: 15mm; }
              @media print { 
                 body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } 
              }
            </style>
          </head><body style="margin: 0; padding: 0;">
            ${toPrint.map((s, idx) => `
               ${getSampulHTML(s)}
               ${idx !== toPrint.length - 1 ? '<div style="page-break-before: always;"></div>' : ''}
            `).join('')}
            <scr`+`ipt>window.print();</scr`+`ipt>
          </body></html>
        `;
        const win = window.open('', '_blank'); win.document.write(combinedHTML); win.document.close();
      };

      return (
        <div className="bg-white/90 backdrop-blur-sm p-6 sm:p-10 rounded-[2rem] border border-slate-100 shadow-sm max-w-2xl mx-auto text-center mt-6 sm:mt-10">
          <div className="w-16 h-16 sm:w-24 sm:h-24 bg-blue-50 rounded-2xl sm:rounded-[2rem] flex items-center justify-center mx-auto mb-4 sm:mb-6 text-blue-600"><FileBadge className="text-2xl sm:text-4xl"/></div>
          <h2 className="font-extrabold text-xl sm:text-2xl text-slate-800 mb-2">Cetak Sampul Rapor</h2>
          <p className="text-slate-500 font-medium text-xs sm:text-sm mb-6 sm:mb-8">Otomatis mencetak Cover (Sampul 1) dan Identitas Biodata Lengkap (Sampul 2) per siswa.</p>
          
          <select className="w-full p-3 sm:p-4 border border-slate-200 rounded-xl sm:rounded-2xl mb-6 sm:mb-8 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 bg-slate-50 text-xs sm:text-sm" value={selectedStudent} onChange={e=>setSelectedStudent(e.target.value)}>
            <option value="ALL">Cetak Semua Siswa ({students.length} Siswa)</option>
            {students.map(s => <option key={s.id} value={s.id}>{s.nama}</option>)}
          </select>
          
          <button onClick={handlePrint} className="bg-blue-600 hover:bg-blue-700 text-white px-6 sm:px-10 py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold text-sm sm:text-lg w-full shadow-xl flex items-center justify-center gap-3 transition-all"><ExternalLink /> Buka & Cetak Sampul</button>
        </div>
      );
    }

    // Eksekusi Mounting Aplikasi
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
