  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PWA Injector & Blogger Fixer -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const rootEl = document.getElementById('root');
      if (rootEl && rootEl.parentElement !== document.body) document.body.appendChild(rootEl);

      let iconUrl = "https://cdn-icons-png.flaticon.com/512/3135/3135810.png";
      try {
        const savedLogo = localStorage.getItem('savedSchoolLogo');
        if (savedLogo) {
          const srcMatch = savedLogo.match(/src\s*=\s*["']([^"']+)["']/);
          if (srcMatch) iconUrl = srcMatch[1];
          else if (savedLogo.trim().startsWith('http') || savedLogo.trim().startsWith('data:image')) iconUrl = savedLogo.trim();
        }
      } catch(e){}

      const manifestJSON = {
        "name": "E-Raport Qu",
        "short_name": "E-Raport",
        "start_url": location.href.split('?')[0],
        "display": "standalone",
        "background_color": "#0d5c3b",
        "theme_color": "#0d5c3b",
        "icons": [{"src": iconUrl, "sizes": "512x512", "type": "image/png", "purpose": "any maskable"}]
      };
      
      const manifestString = encodeURIComponent(JSON.stringify(manifestJSON));
      const manifestURI = 'data:application/json;charset=utf-8,' + manifestString;
      document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURI}">`);

      const forceCleanBlogger = () => {
        const junk = document.querySelectorAll('iframe[name="navbar"], #navbar-iframe, .Navbar, header, footer, #header, #sidebar, .sidebar-wrapper, .date-header, .post-title');
        junk.forEach(el => el && el.remove());
      };
      forceCleanBlogger();
      setTimeout(forceCleanBlogger, 1000); 
    });
  </script>

  <style>
    :root {
      --color-primary: #0d5c3b;
      --color-primary-hover: #064e3b;

    html, body { margin: 0 !important; padding: 0 !important; width: 100vw !important; height: 100vh !important; overflow: hidden !important; background-color: #f8fafc !important; }
    
    #root { display: block !important; position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 2147483647 !important; background-color: #f8fafc !important; }

<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden m-0 p-0">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    window.isDemoAccount = false;

    const Icon = ({ name, className, title, onClick }) => <i className={`fas ${name} ${className || ''}`} title={title} onClick={onClick}></i>;
    const Home = (p) => <Icon name="fa-home" {...p} />;
    const Users = (p) => <Icon name="fa-users" {...p} />;
    const BookOpen = (p) => <Icon name="fa-book-open" {...p} />;
    const Printer = (p) => <Icon name="fa-print" {...p} />;
    const Settings = (p) => <Icon name="fa-cog" {...p} />;
    const LogOut = (p) => <Icon name="fa-sign-out-alt" {...p} />;
    const Search = (p) => <Icon name="fa-search" {...p} />;
    const Plus = (p) => <Icon name="fa-plus" {...p} />;
    const Save = (p) => <Icon name="fa-save" {...p} />;
    const FileText = (p) => <Icon name="fa-file-alt" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fa-check-circle" {...p} />;
    const Menu = (p) => <Icon name="fa-bars" {...p} />;
    const FileSpreadsheet = (p) => <Icon name="fa-file-excel" {...p} />;
    const Activity = (p) => <Icon name="fa-chart-line" {...p} />;
    const Building = (p) => <Icon name="fa-building" {...p} />;
    const Download = (p) => <Icon name="fa-download" {...p} />;
    const ClipboardList = (p) => <Icon name="fa-clipboard-list" {...p} />;
    const GraduationCap = (p) => <Icon name="fa-graduation-cap" {...p} />;
    const LinkIcon = (p) => <Icon name="fa-link" {...p} />;
    const RefreshCw = (p) => <Icon name="fa-sync-alt" {...p} />;
    const ExternalLink = (p) => <Icon name="fa-external-link-alt" {...p} />;
    const Trash2 = (p) => <Icon name="fa-trash-alt" {...p} />;
    const PieChart = (p) => <Icon name="fa-chart-pie" {...p} />;
    const Filter = (p) => <Icon name="fa-filter" {...p} />;
    const FileBadge = (p) => <Icon name="fa-id-badge" {...p} />;
    const Palette = (p) => <Icon name="fa-palette" {...p} />;
    const UserIcon = (p) => <Icon name="fa-user-circle" {...p} />;
    const Lock = (p) => <Icon name="fa-lock" {...p} />;
    const Bullhorn = (p) => <Icon name="fa-bullhorn" {...p} />;
    const Times = (p) => <Icon name="fa-times" {...p} />;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxbO2Fi5EnZFuNcbLdkhQAg4nXHv_Ob7pcv0MmI6ZbQeNd-TOR0fMIhAbJB78W1lqM/exec";

    const syncToCloud = async (key, payload, tahunAjaran) => {
      if (window.isDemoAccount) return;
      try {
        const formattedTahunAjaran = tahunAjaran ? tahunAjaran.replace(/\//g, '_').replace(/ /g, '') : '2025_2026';
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'save', key, payload, tahunAjaran: `Tahun_${formattedTahunAjaran}` })
        });
      } catch (error) { console.error(`[Cloud Sync Failed] Key: ${key}`, error); }
    };

    const cleanLogoUrl = (input) => {
      if (!input) return '';
      const srcMatch = input.match(/src\s*=\s*["']([^"']+)["']/);
      return srcMatch ? srcMatch[1] : input.replace(/<[^>]*>?/gm, '').trim(); 
    };

    const extractClassNumber = (rombel) => {
      if(!rombel) return 0;
      const s = rombel.toString().toUpperCase().trim();
      const match = s.match(/\d+/);
      if(match) return parseInt(match[0]);
      if(s.startsWith('XII')) return 12; if(s.startsWith('XI')) return 11; if(s.startsWith('X')) return 10;
      if(s.startsWith('IX')) return 9; if(s.startsWith('VIII')) return 8; if(s.startsWith('VII')) return 7;
      if(s.startsWith('VI')) return 6; if(s.startsWith('IV')) return 4; if(s.startsWith('V')) return 5;
      if(s.startsWith('III')) return 3; if(s.startsWith('II')) return 2; if(s.startsWith('I')) return 1;
      return 0;
    };

    const getFase = (rombel) => {
      const num = extractClassNumber(rombel);
      if(num >= 1 && num <= 2) return 'A'; if(num >= 3 && num <= 4) return 'B'; if(num >= 5 && num <= 6) return 'C';
      if(num >= 7 && num <= 9) return 'D'; if(num === 10) return 'E'; if(num >= 11 && num <= 12) return 'F';
      return '-';
    };

    const savedLogoData = localStorage.getItem('savedSchoolLogo') || '';
    const INITIAL_PROFIL = { namaSekolah: '', npsn: '', kepalaSekolah: '', nip: '', semester: '1 (SATU)', tahunAjaran: '2025/2026', tanggalRaport: '', kecamatan: '', alamat: '', logo: savedLogoData, pengumuman: '' };
    const INITIAL_TEMA = { colorTheme: 'hijau', adminPhoto: '', useWatermark: true, watermarkOpacity: 15, tableHeaderBg: '#d1d5db', tableHeaderTxt: '#000000' };
    const DIMENSI_P5 = ['Keimanan dan ketaqwaan kepada Tuhan yang Maha Esa', 'Kewargaan', 'Penalaran kritis', 'Kreativitas', 'Kolaborasi', 'Kemandirian', 'Kesehatan', 'Komunikasi'];
    const INITIAL_KKM = { kkm: 70, batasA: 90, batasB: 80, batasC: 70 };

    const COLOR_THEMES = {
      hijau: { primary: '#0d5c3b', primaryHover: '#064e3b', primaryLight: '#ecfdf5' },
      biru: { primary: '#1d4ed8', primaryHover: '#1e3a8a', primaryLight: '#eff6ff' },
      ungu: { primary: '#6d28d9', primaryHover: '#4c1d95', primaryLight: '#f5f3ff' },
      merah: { primary: '#e11d48', primaryHover: '#9f1239', primaryLight: '#fff1f2' }
    };

    const toProperCase = (str) => {
      if (!str) return '';
      return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
    };

    function parseCSV(str) {
      const arr = []; let quote = false;
      for (let row = 0, col = 0, c = 0; c < str.length; c++) {
          let cc = str[c], nc = str[c+1];
          arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
          if (cc === '"' && quote && nc === '"') { arr[row][col] += cc; ++c; continue; }
          if (cc === '"') { quote = !quote; continue; }
          if (cc === ',' && !quote) { ++col; continue; }
          if (cc === '\r' && nc === '\n' && !quote) { ++row; col = 0; ++c; continue; }
          if (cc === '\n' && !quote) { ++row; col = 0; continue; }
          if (cc === '\r' && !quote) { ++row; col = 0; continue; }
          arr[row][col] += cc;
      }
      return arr;
    }

    // NORMALISASI STRUKTUR MATERI
    const normalizeMateri = (val) => {
       if (typeof val === 'string') {
          return { tp: val.replace(/^\[(TP|LM)\]\s*/, ''), lm: '' };
       }
       return val || { tp: '', lm: '' };
    };

    function App() {
      const [isAppLoading, setIsAppLoading] = useState(true);
      const [loadingProgress, setLoadingProgress] = useState(0); 
      
      // Load Session
      const [user, setUser] = useState(() => {
        try { const saved = localStorage.getItem('activeUser'); return saved ? JSON.parse(saved) : null; } 
        catch (e) { return null; }
      });

      const [activeMenu, setActiveMenu] = useState('dashboard');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [toastMessage, setToastMessage] = useState(null);
      const [isProfileModalOpen, setIsProfileModalOpen] = useState(false);
      const [showInstallPrompt, setShowInstallPrompt] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);

      const [profilSekolah, setProfilSekolah] = useState(INITIAL_PROFIL);
      const [temaConfig, setTemaConfig] = useState(INITIAL_TEMA);
      const [guruProfil, setGuruProfil] = useState({});
      const [teachers, setTeachers] = useState([]);
      const [mapelList, setMapelList] = useState([]);
      const [ekskulList, setEkskulList] = useState([]);
      const [allStudents, setAllStudents] = useState([]); 
      const [materiGuru, setMateriGuru] = useState({}); 
      const [studentGrades, setStudentGrades] = useState({}); 
      const [absensi, setAbsensi] = useState({}); 
      const [ekskulData, setEkskulData] = useState({}); 
      const [kokuData, setKokuData] = useState({}); 
      const [guruMapelConfig, setGuruMapelConfig] = useState({}); 
      const [guruRombelConfig, setGuruRombelConfig] = useState({}); 
      const [dimensiTarget, setDimensiTarget] = useState([DIMENSI_P5[0], DIMENSI_P5[5], DIMENSI_P5[3]]);
      const [kkmConfig, setKkmConfig] = useState(INITIAL_KKM);
      const [confirmDialog, setConfirmDialog] = useState(null);

      useEffect(() => {
        const pushState = () => window.history.pushState(null, "", window.location.href);
        pushState();
        const handlePopState = () => { pushState(); showToast("Aksi Kembali dinonaktifkan. Gunakan menu navigasi."); };
        window.addEventListener("popstate", handlePopState);
        return () => window.removeEventListener("popstate", handlePopState);
      }, []);

      useEffect(() => {
         const t = COLOR_THEMES[temaConfig.colorTheme] || COLOR_THEMES.hijau;
         document.documentElement.style.setProperty('--color-primary', t.primary);
         document.documentElement.style.setProperty('--color-primary-hover', t.primaryHover);
         document.documentElement.style.setProperty('--color-primary-light', t.primaryLight);
      }, [temaConfig.colorTheme]);

      useEffect(() => {
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setDeferredPrompt(e); });
      }, []);

      const triggerInstall = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') setDeferredPrompt(null);
        } else {
          setShowInstallPrompt(true);
        }
      };

      useEffect(() => {
        const handleDemoToast = (e) => showToast(e.detail);
        window.addEventListener('demo-toast', handleDemoToast);

        const fetchInitialData = async () => {
          let progress = 0;
          const animInterval = setInterval(() => {
             progress += Math.floor(Math.random() * 8) + 2;
             if(progress > 90) progress = 90;
             setLoadingProgress(progress);
          }, 300);

          try {
            const activeYear = localStorage.getItem('activeTahunAjaran') || '2025_2026';
            const res = await fetch(GAS_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'loadAll', tahunAjaran: `Tahun_${activeYear}` })
            });
            const json = await res.json();
            
            if (json.status === 'success' && json.data) {
              if (json.data.profil) { setProfilSekolah(json.data.profil); if(json.data.profil.logo) localStorage.setItem('savedSchoolLogo', json.data.profil.logo); }
              if (json.data.temaConfig) setTemaConfig(json.data.temaConfig);
              if (json.data.guruProfil) setGuruProfil(json.data.guruProfil);
              if (json.data.teachers) setTeachers(json.data.teachers);
              if (json.data.mapel) setMapelList(json.data.mapel);
              if (json.data.ekskul) setEkskulList(json.data.ekskul);
              if (json.data.allStudents) setAllStudents(json.data.allStudents);
              if (json.data.materiGuru) setMateriGuru(json.data.materiGuru);
              if (json.data.studentGrades) setStudentGrades(json.data.studentGrades);
              if (json.data.absensi) setAbsensi(json.data.absensi);
              if (json.data.ekskulData) setEkskulData(json.data.ekskulData);
              if (json.data.kokuData) setKokuData(json.data.kokuData);
              if (json.data.guruMapelConfig) setGuruMapelConfig(json.data.guruMapelConfig);
              if (json.data.guruRombelConfig) setGuruRombelConfig(json.data.guruRombelConfig);
              if (json.data.dimensiTarget) setDimensiTarget(json.data.dimensiTarget);
              if (json.data.kkmConfig) setKkmConfig(json.data.kkmConfig);
            }
          } catch (e) {
            console.error("Gagal load initial data", e);
          } finally {
            clearInterval(animInterval);
            setLoadingProgress(100);
            setTimeout(() => setIsAppLoading(false), 800); 
          }
        };
        fetchInitialData();
        return () => window.removeEventListener('demo-toast', handleDemoToast);
      }, []);

      const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 4000); };
      const showConfirm = (message, onConfirm) => { setConfirmDialog({ message, onConfirm }); };

      const handleLogin = (role, nama, username) => {
        const newUser = { role, name: nama || (role === 'admin' ? (profilSekolah.kepalaSekolah || 'Admin Kepala Sekolah') : 'Guru'), username };
        setUser(newUser);
        localStorage.setItem('activeUser', JSON.stringify(newUser));
        setActiveMenu('dashboard');
      };

      const handleLogout = () => {
         setUser(null);
         localStorage.removeItem('activeUser');
         window.isDemoAccount = false;
      };

      const currentRombel = user?.role !== 'admin' ? guruRombelConfig[user?.username] : null;

      const students = useMemo(() => {
        if (!user) return [];
        if (user.role === 'admin') return allStudents;
        if (!currentRombel) return [];
        return allStudents.filter(s => s.rombelSD === currentRombel);
      }, [user, allStudents, currentRombel]);

      const activeMapelList = user?.role === 'admin' 
        ? mapelList 
        : (currentRombel && guruMapelConfig[`${user.username}_${currentRombel}`] && guruMapelConfig[`${user.username}_${currentRombel}`].length > 0 
            ? guruMapelConfig[`${user.username}_${currentRombel}`] 
            : (guruMapelConfig[user?.username] || mapelList));

      const calculateNA = (mapel, studentId, mg = materiGuru, sg = studentGrades) => {
        const s = allStudents.find(x => x.id === studentId);
        const rombel = s ? s.rombelSD : '';
        const materiKey = rombel ? `${rombel}_${mapel}` : mapel;
        const rawMateri = mg[materiKey] || mg[mapel] || [];
        const materiArr = rawMateri.map(normalizeMateri);
        
        const scores = (sg[mapel] || {})[studentId] || {};
        let totalM = 0, countM = 0;
        
        materiArr.forEach((mObj, idx) => {
          if((mObj.tp.trim() !== '' || mObj.lm.trim() !== '') && scores[`m${idx}`] !== undefined && scores[`m${idx}`] !== null) {
             totalM += scores[`m${idx}`]; countM++;
          }
        });
        
        if (countM === 0 && (scores.sts === undefined || scores.sts === null) && (scores.sas === undefined || scores.sas === null)) return null;
        const rataM = countM > 0 ? totalM / countM : 0;
        return parseFloat((((rataM) + (scores.sts||0) + (scores.sas||0)) / (countM > 0 ? 3 : ((scores.sts!==undefined&&scores.sts!==null) && (scores.sas!==undefined&&scores.sas!==null) ? 2 : 1))).toFixed(2));
      };

      if (isAppLoading) {
        return (
          <div className="fixed inset-0 w-screen h-screen m-0 p-0 overflow-hidden bg-slate-50 z-[2147483647] flex flex-col items-center justify-center p-6 text-center">
            {profilSekolah.logo ? (
              <img src={cleanLogoUrl(profilSekolah.logo)} className="w-32 h-32 mb-8 object-contain drop-shadow-xl animate-pulse" alt="Logo Sekolah" />
            ) : (
              <GraduationCap className="w-24 h-24 text-primary mb-8 animate-pulse text-6xl" />
            )}
            <div className="w-full max-w-sm h-6 bg-slate-200 rounded-full overflow-hidden mb-4 shadow-inner relative">
               <div className="h-full bg-gradient-to-r from-emerald-500 to-primary transition-all duration-300 ease-out flex items-center justify-end pr-3" style={{width: `${loadingProgress}%`}}>
                  {loadingProgress > 10 && <span className="text-xs text-white font-bold">{loadingProgress}%</span>}
               </div>
            </div>
            <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight mb-2">Memuat Database E-Raport Qu...</h2>
          </div>
        );
      }

      const activeContext = { profil: profilSekolah, temaConfig, guruProfil, teachers, mapel: mapelList, ekskul: ekskulList, allStudents, materiGuru, studentGrades, absensi, ekskulData, kokuData, guruMapelConfig, dimensiTarget, kkmConfig };

      if (!user) return (
        <div className="fixed inset-0 w-screen h-screen m-0 p-0 overflow-hidden z-[2147483647] bg-slate-50">
          <LoginScreen onLogin={handleLogin} teachers={teachers} profil={profilSekolah} temaConfig={temaConfig} onInstallClick={triggerInstall} />
        </div>
      );

      const renderContent = () => {
        const requireRombelMenus = ['pengaturan_mapel', 'input_materi', 'input_nilai', 'input_absensi', 'input_ekskul', 'input_koku', 'leger', 'cetak_rapor', 'cetak_sampul'];
        
        if (user.role === 'guru' && requireRombelMenus.includes(activeMenu) && !currentRombel) {
           return (
             <div className="flex flex-col items-center justify-center p-8 sm:p-16 bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-sm border border-red-100 max-w-xl mx-auto mt-10 text-center animate-slide-down">
                <div className="w-24 h-24 bg-red-50 text-red-500 rounded-[2rem] flex items-center justify-center mb-6 shadow-inner"><Lock className="text-5xl" /></div>
                <h2 className="text-2xl font-black text-slate-800 mb-3 tracking-tight">Akses Menu Terkunci!</h2>
                <p className="text-slate-500 font-medium mb-8 leading-relaxed">Anda harus memilih Kelas (Rombel) yang Anda ampu terlebih dahulu agar sistem dapat menyiapkan data.</p>
                <button onClick={() => setActiveMenu('tarik_siswa')} className="bg-primary hover:bg-primaryHover text-white px-8 py-4 rounded-xl font-bold text-lg shadow-xl flex items-center gap-3 transition-all">
                  Pilih Kelas Sekarang <ExternalLink/>
                </button>
             </div>
           );
        }

        if (user.role === 'admin') {
          switch (activeMenu) {
            case 'dashboard': return <AdminDashboard teachers={teachers} students={allStudents} />;
            case 'pengumuman': return <AdminPengumuman profil={profilSekolah} setProfil={setProfilSekolah} showToast={showToast} />;
            case 'data_guru': return <AdminDataGuru teachers={teachers} setTeachers={setTeachers} profil={profilSekolah} showToast={showToast} showConfirm={showConfirm} />;
            case 'master_mapel': return <AdminMasterMapel mapel={mapelList} setMapel={setMapelList} ekskul={ekskulList} setEkskul={setEkskulList} profil={profilSekolah} showToast={showToast} />;
            case 'kkm_nilai': return <AdminKKM kkmConfig={kkmConfig} setKkmConfig={setKkmConfig} profil={profilSekolah} showToast={showToast} />;

        else if (inputVal === 'demo_guru') { window.isDemoAccount = true; onLogin('guru', 'Wali Kelas Demo', 'demo_guru'); }
        else if (inputVal === 'admin') { window.isDemoAccount = false; onLogin('admin', profil.kepalaSekolah || 'Admin', 'admin'); }
        else {
          const guru = teachers.find(t => t.username.toLowerCase() === inputVal || t.nama.toLowerCase().includes(inputVal));
          if (guru) { window.isDemoAccount = false; onLogin('guru', guru.nama, guru.username); }
          else setErrorMsg('Nama/Username tidak terdaftar di sistem. Hubungi Admin.');

       const [pesan, setPesan] = useState(profil.pengumuman || '');

       const handleClear = () => { setPesan(''); const updated = {...profil, pengumuman: ''}; setProfil(updated); syncToCloud('profil', updated, profil.tahunAjaran); showToast('Pengumuman dihapus!'); };
       return (
         <div className="bg-white p-6 sm:p-8 rounded-[2rem] shadow-sm border max-w-3xl">

         </div>
       );
    }

    function AdminDataGuru({ teachers, setTeachers, profil, showToast, showConfirm }) {
      const [csvUrl, setCsvUrl] = useState(localStorage.getItem('csvUrlGuru') || "");
      const [loading, setLoading] = useState(false);

      const handleSyncGuru = async () => {
        setLoading(true);
        localStorage.setItem('csvUrlGuru', csvUrl);
        try {
          const res = await fetch(csvUrl);
          if(!res.ok) throw new Error("Gagal");
          const text = await res.text();
          const rows = parseCSV(text);
          if (rows.length > 1) {
            const header = rows[0].map(h => h.trim().toUpperCase().replace(/[^A-Z0-9]/g, ''));
            const getCol = (hName) => header.findIndex(h => h.includes(hName.replace(/[^A-Z0-9]/g, '')));
            const iNama = getCol('NAMA'), iNip = getCol('NIP'), iWali = getCol('WALI'), iMapel = getCol('MAPEL'), iUser = getCol('USER');
            const parsed = rows.slice(1).map((row, idx) => {
              const gName = iNama !== -1 ? row[iNama] : `Guru ${idx+1}`;
              if (!gName || gName.trim() === '') return null;
              const gUsername = iUser !== -1 && row[iUser] ? row[iUser] : gName.split(' ')[0].toLowerCase() + (idx+1);
              return { id: `G-${Date.now()}-${idx}`, nama: gName.trim(), nip: iNip !== -1 ? row[iNip] : '-', waliKelas: iWali !== -1 ? row[iWali] : '-', mapel: iMapel !== -1 ? row[iMapel] : '-', username: gUsername.trim() };
            }).filter(g => g !== null); 
            if (parsed.length > 0) { setTeachers(parsed); showToast(`Sinkronisasi ${parsed.length} Guru Berhasil!`); syncToCloud('teachers', parsed, profil.tahunAjaran); }
          }
        } catch (e) { showToast("Gagal menarik data CSV."); }
        setLoading(false);
      };

      const deleteTeacher = (id) => showConfirm('Hapus data guru ini?', () => { const updated = teachers.filter(t => t.id !== id); setTeachers(updated); syncToCloud('teachers', updated, profil.tahunAjaran); });

      return (
        <div className="space-y-6">

    function AdminDataSiswa({ allStudents, setAllStudents, profil, showToast }) {
      const [csvUrl, setCsvUrl] = useState("https://docs.google.com/spreadsheets/d/e/2PACX-1vTj9NDKstrj0d9JH7PSMGc4X9ZP1JEarvqoXhF2BZcesqs52oW_jYNKd_fI832uYg/pub?gid=1632329455&single=true&output=csv");
      const [loading, setLoading] = useState(false);

      const handleSync = async () => {
        setLoading(true);
        try {
          const res = await fetch(csvUrl);
          const text = await res.text();
          const rows = parseCSV(text);
          const header = rows[0].map(h => h.trim().toUpperCase().replace(/[^A-Z0-9]/g, ''));
          const getCol = (hName) => header.findIndex(h => h.includes(hName));
          const parsed = rows.slice(1).map((row, idx) => {
            return {
              id: `S-${Date.now()}-${idx}`,
              nama: row[getCol('NAMASISWA')] || `Siswa ${idx}`, nisn: row[getCol('NISN')] || '-', nis: row[getCol('NIS')] || '-',
              rombelSD: row[getCol('ROMBELSD')] || '-', tempatTanggalLahir: row[getCol('TEMPATTANGGALLAHIR')] || '-',
              jenisKelamin: row[getCol('JENISKELAMIN')] || '-', agama: row[getCol('AGAMA')] || 'Islam',
              namaAyah: row[getCol('NAMAAYAH')] || '-', namaIbu: row[getCol('NAMAIBU')] || '-',
              pekerjaanAyah: row[getCol('PEKERJAANAYAH')] || '-', pekerjaanIbu: row[getCol('PEKERJAANIBU')] || '-',
              alamat: { jalan: row[getCol('DUSUN')]||'-', desa: row[getCol('DESA')]||'-', kecamatan: row[getCol('KECAMATAN')]||'-', kabupaten: row[getCol('KABUPATEN')]||'-'}
            };
          }).filter(s => s.nama !== `Siswa ${idx}`);
          setAllStudents(parsed); showToast("Siswa Tersinkron!"); syncToCloud('allStudents', parsed, profil.tahunAjaran);
        } catch (e) {} setLoading(false);
      };
      return (
        <div className="bg-white p-6 rounded-[2rem] border max-w-4xl"><h2 className="font-extrabold text-xl mb-4">Master Data Siswa</h2><div className="flex gap-4"><input className="flex-1 p-4 border rounded-xl" value={csvUrl} onChange={e=>setCsvUrl(e.target.value)} /><button onClick={handleSync} className="bg-blue-600 text-white px-6 py-4 rounded-xl font-bold">{loading?'Memuat...':'Sinkron'}</button></div></div>
      );
    }

            </table>
          </div>
        </div>
      );
    }

    // --- REVISI 2: INPUT EKSKUL ---
    function GuruInputEkskul({ students, ekskulList, ekskulData, setEkskulData, profil, showToast }) {
      const updateEkskul = (sId, eksName, field, val) => setEkskulData(p => ({ ...p, [sId]: { ...(p[sId]||{}), [eksName]: { ...((p[sId]||{})[eksName]||{}), [field]: val } } }));
      const handleSave = () => { syncToCloud('ekskulData', ekskulData, profil.tahunAjaran); showToast('Tersimpan!'); };
      return (
        <div className="bg-white p-8 rounded-[2rem] border">
          <div className="flex justify-between items-center mb-8 border-b pb-6"><h2 className="font-extrabold text-2xl">Penilaian Ekskul</h2><button onClick={handleSave} className="bg-primary text-white px-6 py-3 rounded-2xl font-bold">Simpan</button></div>
          <div className="w-full border rounded-2xl table-container overflow-x-auto">
            <table className="w-full text-left min-w-[800px]">
              <thead className="bg-slate-50 border-b"><tr><th className="p-4 w-14 whitespace-nowrap text-center border-r">No</th><th className="p-4 border-r w-[250px]">NAMA SISWA</th>{ekskulList.map(e => <th key={e} className="p-4 border-r text-center font-bold">{e}</th>)}</tr></thead>
              <tbody className="divide-y">{students.map((s,i) => (
                <tr key={s.id}><td className="p-4 font-bold border-r text-center whitespace-nowrap">{i+1}</td><td className="p-4 font-extrabold border-r">{s.nama}</td>
                  {ekskulList.map(e => { const ed = (ekskulData[s.id]||{})[e]||{}; return (
                    <td key={e} className="p-2 border-r bg-slate-50/30">
                      <div className="flex flex-col gap-2">
                        <select className="w-full p-2 border rounded font-bold text-center" value={ed.nilai||'-'} onChange={ev=>updateEkskul(s.id, e, 'nilai', ev.target.value)}><option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                        <input type="text" placeholder="Materi kegiatan..." className="w-full p-2 border rounded" value={ed.materi||''} onChange={ev=>updateEkskul(s.id, e, 'materi', ev.target.value)} />
                      </div>
                    </td>)
                  })}
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );
    }

    function GuruInputKoku({ students, kokuData, setKokuData, dimensiTarget, setDimensiTarget, profil, showToast }) {
      const handleUpdate = (id, field, val) => setKokuData(p => ({...p, [id]: {...(p[id]||{}), [field]: val}}));
      const handleSave = () => { syncToCloud('kokuData', kokuData, profil.tahunAjaran); syncToCloud('dimensiTarget', dimensiTarget, profil.tahunAjaran); showToast('Tersimpan!'); };
      return (
        <div className="bg-white p-8 rounded-[2rem] border">
          <div className="flex justify-between items-center mb-8 border-b pb-6"><h2 className="font-extrabold text-2xl">Penilaian Kokurikuler (P5)</h2><button onClick={handleSave} className="bg-primary text-white px-6 py-3 rounded-2xl font-bold">Simpan</button></div>
          <div className="w-full border rounded-2xl table-container overflow-x-auto">
            <table className="w-full text-left min-w-[900px]">
              <thead className="bg-slate-50 border-b"><tr><th className="p-4 w-14 whitespace-nowrap text-center border-r">No</th><th className="p-4 border-r w-[250px]">NAMA SISWA</th><th className="p-4 border-r w-[150px]">D1</th><th className="p-4 border-r w-[150px]">D2</th><th className="p-4 border-r w-[150px]">D3</th><th className="p-4">Deskripsi Manual</th></tr></thead>
              <tbody className="divide-y">{students.map((s,i) => { const row = kokuData[s.id] || { d1: 'Sangat Baik', d2: 'Sangat Baik', d3: 'Sangat Baik', ket: ''}; return (
                <tr key={s.id}><td className="p-4 font-bold border-r text-center whitespace-nowrap">{i+1}</td><td className="p-4 font-extrabold border-r">{s.nama}</td>
                  {['d1','d2','d3'].map(d => <td key={d} className="p-2 border-r"><select value={row[d]} onChange={e=>handleUpdate(s.id, d, e.target.value)} className="w-full p-2 border rounded"><option>Sangat Baik</option><option>Baik</option><option>Cukup</option><option>Kurang</option></select></td>)}
                  <td className="p-2"><textarea className="w-full p-2 border rounded" value={row.ket||''} onChange={e=>handleUpdate(s.id, 'ket', e.target.value)}></textarea></td>
                </tr>
              )})}</tbody>
            </table>
          </div>
        </div>
      );
    }

    function GuruLeger({ students, mapelList, calculateNA, profil, waliKelasName }) {
      const legerData = students.map(s => { let total=0, scores={}; mapelList.forEach(m=>{ let na=calculateNA(m,s.id)||0; scores[m]=na; total+=na; }); return { ...s, total, avg: mapelList.length? (total/mapelList.length).toFixed(2):0, scores }; }).sort((a,b)=>b.total-a.total);
      legerData.forEach((s,i)=>s.juara=i+1);

      return (
        <div className="bg-white p-8 rounded-[2rem] border">
          <h2 className="font-extrabold text-2xl mb-8 border-b pb-6">Leger Kelas</h2>
          <div className="w-full border rounded-2xl table-container overflow-x-auto">
            <table className="w-full text-left min-w-[1000px]">
              <thead className="bg-primary text-white"><tr><th className="p-4 text-center border-r w-14 whitespace-nowrap">No</th><th className="p-4 border-r w-[250px]">Nama Siswa</th>{mapelList.map(m=><th key={m} className="p-2 text-center border-r"><div className="w-16 truncate" title={m}>{m}</div></th>)}<th className="p-2 text-center border-r w-20">JML</th><th className="p-2 text-center w-16">JUA</th></tr></thead>
              <tbody className="divide-y text-slate-700">{legerData.sort((a,b)=>a.nama.localeCompare(b.nama)).map((s,i)=><tr key={s.id}><td className="p-4 text-center font-bold border-r whitespace-nowrap">{i+1}</td><td className="p-4 font-bold border-r">{s.nama}</td>{mapelList.map(m=><td key={m} className="p-2 text-center font-bold border-r">{Math.round(s.scores[m])}</td>)}<td className="p-2 text-center font-black border-r">{Math.round(s.total)}</td><td className="p-2 text-center font-black text-primary">{s.juara}</td></tr>)}</tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- REVISI 4, 5, & 9 : CETAK RAPOR ---
    function GuruCetakRapor({ students, mapelList, calculateNA, profil, waliKelasName, kokuData, ekskulList, ekskulData, absensi, materiGuru, studentGrades, kkmConfig, temaConfig }) {
      const [selectedStudent, setSelectedStudent] = useState('ALL');

      const getStudentHTML = (s) => {
        let totalNa = 0;
        
        // REVISI 4: Filter mapel kosong
        let mapelTerisi = mapelList.filter(m => calculateNA(m, s.id) !== null);

        let rows = mapelTerisi.map((m, idx) => {
          let na = calculateNA(m, s.id) || 0;
          totalNa += na;
          
          // Generate Keterangan based on TP & LM
          const rombel = s.rombelSD || '';
          const materiKey = rombel ? `${rombel}_${m}` : m;
          const rawMateri = materiGuru[materiKey] || materiGuru[m] || [];
          const materiArr = rawMateri.map(normalizeMateri).filter(mObj => mObj.tp.trim() !== '' || mObj.lm.trim() !== '');
          const scores = (studentGrades[m] || {})[s.id] || {};
          
          let ket = "-";
          if(materiArr.length > 0) {
             let maxVal = -1, minVal = 101, maxIdx = -1, minIdx = -1;
             materiArr.forEach((_, i) => { const v = scores[`m${i}`]; if(v !== undefined && v !== null) { if(v>maxVal){maxVal=v;maxIdx=i;} if(v<minVal){minVal=v;minIdx=i;} } });
             if(maxIdx !== -1) {
                const highObj = materiArr[maxIdx], lowObj = materiArr[minIdx];
                const cleanHigh = `${highObj.tp} ${highObj.lm ? `pada materi ${highObj.lm}` : ''}`.trim();
                const cleanLow = `${lowObj.tp} ${lowObj.lm ? `pada materi ${lowObj.lm}` : ''}`.trim();
                ket = `Ananda menguasai dan memahami ${cleanHigh}`;
                if (minVal < 70) ket += `.<br/>Ananda perlu pendampingan lebih dalam ${cleanLow}.`;
                else if (maxIdx !== minIdx) ket += `, serta penguasaan baik dalam ${cleanLow}.`;
             }
          }

          return `<tr><td class="border border-black p-2 text-center" style="vertical-align: top;">${idx+1}</td><td class="border border-black p-2" style="vertical-align: top;">${m}</td><td class="border border-black p-2 text-center font-bold text-base" style="vertical-align: top;">${Math.round(na)}</td><td class="border border-black p-2 text-sm text-justify" style="vertical-align: top;">${ket}</td></tr>`;
        }).join('');

        const avgNum = mapelTerisi.length > 0 ? totalNa / mapelTerisi.length : 0;
        let dynamicCatatan = (avgNum >= 90) ? `Alhamdulillah, Ananda meraih hasil belajar yang sangat memuaskan.` : (avgNum >= (kkmConfig.kkm||70)) ? `Ananda telah mencapai ketuntasan. Terus tingkatkan.` : `Ananda membutuhkan bimbingan ekstra.`;

        // REVISI 2: Ekskul Rapor
        let ekskulRows = ekskulList.map((e, idx) => {
          let eVal = (ekskulData[s.id]||{})[e]||{};
          let predikat = eVal.nilai || '-';
          let mEks = eVal.materi || '';
          let txtKet = '-';
          if(predikat === 'A') txtKet = `Sangat Bagus dalam ${mEks} dan pertahankan`;
          else if(predikat === 'B') txtKet = `Bagus dalam ${mEks}`;
          else if(predikat === 'C') txtKet = `Cukup dalam ${mEks}`;
          else if(predikat === 'D') txtKet = `Perlu bimbingan dalam ${mEks}`;
          
          return `<tr><td class="border border-black p-2 text-center">${idx+1}</td><td class="border border-black p-2">${e}</td><td class="border border-black p-2 text-sm">${txtKet}</td></tr>`;
        }).join('');

        const a = absensi[s.id] || {sakit:0, izin:0, alfa:0};
        const headerBg = temaConfig.tableHeaderBg || '#d1d5db';
        const cetakKecamatan = profil.kecamatan ? profil.kecamatan.split(',')[0].trim() : '';

        return `
          <div style="page-break-after: always; padding: 10mm; font-family: Arial, sans-serif; font-size: 14px;">
            <!-- REVISI 5: LAPORAN HASIL BELAJAR SISWA -->
            <h2 style="text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px;">LAPORAN HASIL BELAJAR SISWA</h2>
            
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold;">
               <table style="width:48%"><tr><td style="width:100px;">Nama</td><td>: ${s.nama}</td></tr><tr><td>NISN</td><td>: ${s.nisn}</td></tr></table>
               <table style="width:48%"><tr><td style="width:100px;">Kelas</td><td>: ${s.rombelSD}</td></tr><tr><td>Semester</td><td>: ${profil.semester}</td></tr></table>
            </div>

            <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
              <thead style="background-color: ${headerBg} !important; -webkit-print-color-adjust: exact;">
                <tr><th style="border:1px solid black; padding:8px; width:40px;">No</th><th style="border:1px solid black; padding:8px;">Mata Pelajaran</th><th style="border:1px solid black; padding:8px; width:60px;">Nilai</th><th style="border:1px solid black; padding:8px;">Capaian Kompetensi</th></tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>

            <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
               <thead style="background-color: ${headerBg} !important; -webkit-print-color-adjust: exact;"><tr><th style="border:1px solid black; padding:8px; width:40px;">No</th><th style="border:1px solid black; padding:8px;">Ekstrakurikuler</th><th style="border:1px solid black; padding:8px;">Keterangan</th></tr></thead>
               <tbody>${ekskulRows}</tbody>
            </table>

            <div style="display:flex; gap:20px; margin-bottom:20px;">
               <table style="width:45%; border-collapse:collapse; height:fit-content;">
                  <thead style="background-color: ${headerBg} !important; -webkit-print-color-adjust: exact;"><tr><th colspan="2" style="border:1px solid black; padding:8px;">Ketidakhadiran</th></tr></thead>
                  <tbody><tr><td style="border:1px solid black; padding:8px;">Sakit</td><td style="border:1px solid black; padding:8px; text-align:center;">${a.sakit||0} hari</td></tr><tr><td style="border:1px solid black; padding:8px;">Izin</td><td style="border:1px solid black; padding:8px; text-align:center;">${a.izin||0} hari</td></tr><tr><td style="border:1px solid black; padding:8px;">Alfa</td><td style="border:1px solid black; padding:8px; text-align:center;">${a.alfa||0} hari</td></tr></tbody>
               </table>
               <table style="width:55%; border-collapse:collapse;">
                  <thead style="background-color: ${headerBg} !important; -webkit-print-color-adjust: exact;"><tr><th style="border:1px solid black; padding:8px;">Catatan Wali Kelas</th></tr></thead>
                  <tbody><tr><td style="border:1px solid black; padding:8px; height:100px; vertical-align:top;">${dynamicCatatan}</td></tr></tbody>
               </table>
            </div>

            <!-- REVISI 9: TTD HILANG DAN NAMA TERANG -->
            <div style="display:flex; justify-content:space-between; margin-top:40px; text-align:center;">
               <div style="width:33%;">
                 <p style="margin-bottom:80px;">Orang Tua Murid</p>
                 <p style="border-bottom:1px solid black; display:inline-block; width:150px;"></p>
               </div>
               <div style="width:33%;">
                 <p style="margin-bottom:80px;">Kepala Sekolah</p>
                 <p style="border-bottom:1px solid black; display:inline-block; width:200px; font-weight:bold; text-transform:uppercase;">${profil.kepalaSekolah}</p>
               </div>
               <div style="width:33%;">
                 <p style="margin-bottom:5px;">${cetakKecamatan}, ${profil.tanggalRaport}</p>
                 <p style="margin-bottom:60px;">Wali Kelas</p>
                 <p style="border-bottom:1px solid black; display:inline-block; width:200px; font-weight:bold; text-transform:uppercase;">${waliKelasName}</p>
               </div>
            </div>
          </div>
        `;
      };

      const handlePrint = () => {
        let toPrint = selectedStudent === 'ALL' ? students : students.filter(s => s.id.toString() === selectedStudent);
        const combinedHTML = `
          <html><head><title>Cetak Rapor</title>
          <style>@media print { .print-hide { display: none !important; } body { -webkit-print-color-adjust: exact !important; } }</style>
          </head><body style="margin:0; font-family:Arial, sans-serif;">
            <!-- REVISI 3: TOMBOL CETAK MANUAL -->
            <div class="print-hide" style="position:fixed; top:20px; right:20px; z-index:9999;">
               <button onclick="window.print()" style="padding:15px 30px; background-color:#0d5c3b; color:white; font-weight:bold; border-radius:10px; border:none; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-size:16px;">🖨️ Cetak Dokumen</button>
            </div>
            ${toPrint.map(s => getStudentHTML(s)).join('')}
          </body></html>`;
        const win = window.open('', '_blank'); win.document.write(combinedHTML); win.document.close();
      };

      return (
        <div className="bg-white p-12 rounded-[2rem] border text-center max-w-2xl mx-auto"><Printer className="text-6xl text-primary mb-6 mx-auto"/>
          <h2 className="font-extrabold text-2xl mb-8">Cetak Rapor</h2>
          <select className="w-full p-4 border rounded-xl font-bold mb-8" value={selectedStudent} onChange={e=>setSelectedStudent(e.target.value)}><option value="ALL">Cetak Semua</option>{students.map(s => <option key={s.id} value={s.id}>{s.nama}</option>)}</select>
          <button onClick={handlePrint} className="bg-primary text-white px-10 py-4 rounded-xl font-bold w-full">Buka & Cetak Dokumen</button>
        </div>
      );
    }

    // --- REVISI 10: HAPUS KOTAK FOTO SAMPUL ---
    function GuruCetakSampul({ students, profil }) {
      const getSampulHTML = (s) => `
        <div style="page-break-after: always; padding: 15mm; font-family: 'Times New Roman', serif; font-size: 14px;">
           <h2 style="text-align: center; text-decoration: underline; margin-bottom: 30px;">IDENTITAS PESERTA DIDIK</h2>
           <table style="width: 100%; line-height: 1.8;">
              <tr><td style="width: 35%;">1. Nama Peserta Didik</td><td style="width: 2%;">:</td><td style="text-transform: uppercase; font-weight:bold;">${s.nama}</td></tr>
              <tr><td>2. Nomor Induk / NISN</td><td>:</td><td>${s.nis} / ${s.nisn}</td></tr>
              <tr><td>3. Tempat, Tanggal Lahir</td><td>:</td><td style="text-transform: uppercase;">${s.tempatTanggalLahir}</td></tr>
              <tr><td>4. Jenis Kelamin</td><td>:</td><td>${s.jenisKelamin}</td></tr>
              <tr><td>5. Agama</td><td>:</td><td style="text-transform: uppercase;">${s.agama}</td></tr>
           </table>
           <div style="margin-top: 80px; text-align: right; padding-right: 50px;">
              <p style="margin-bottom: 80px;">${profil.kecamatan}, ${profil.tanggalRaport}<br/>Kepala Sekolah</p>
              <p style="font-weight: bold; text-decoration: underline; text-transform: uppercase;">${profil.kepalaSekolah}</p>
           </div>
        </div>`;

      const handlePrint = () => {
        const combinedHTML = `<html><head><title>Sampul</title><style>@media print { .print-hide { display: none !important; } }</style></head><body>
            <div class="print-hide" style="position:fixed; top:20px; right:20px;"><button onclick="window.print()" style="padding:15px 30px; background-color:#1d4ed8; color:white; font-weight:bold; border-radius:10px; border:none; cursor:pointer;">🖨️ Cetak Sampul</button></div>
            ${students.map(s => getSampulHTML(s)).join('')}</body></html>`;
        const win = window.open('', '_blank'); win.document.write(combinedHTML); win.document.close();
      };
      return (<div className="bg-white p-12 rounded-[2rem] border text-center max-w-2xl mx-auto"><button onClick={handlePrint} className="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold w-full">Buka & Cetak Sampul</button></div>);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
